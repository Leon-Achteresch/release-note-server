# =============================================================================
# GitHub Actions – Automatische Release Notes bei Tag-Push
# =============================================================================
#
# Voraussetzung: Conventional Commits (feat:, fix:, docs:, ...)
#
# 1. Kopiere diese Datei nach .github/workflows/release-notes.yml
# 2. Pushe einen Tag: git tag v1.2.0 && git push --tags
# 3. GitHub Release wird automatisch erstellt
# =============================================================================

name: Release Notes

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (vollstaendige Historie)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # -----------------------------------------------------------------------
      # Variante A: Reusable Action (empfohlen)
      # -----------------------------------------------------------------------
      - name: Release Notes generieren
        id: notes
        uses: LeonAchtworworter/release-note-server@main
        # Ohne Inputs wird alles automatisch aus Git-Tags erkannt.
        # Optionale Inputs:
        # with:
        #   server-url: 'https://rl-server.leon-achteresch.de'  # Default
        #   from: 'v1.0.0'      # Start-Ref manuell setzen
        #   to: 'v1.1.0'        # End-Ref manuell setzen
        #   version: '1.1.0'    # Version ueberschreiben
        #   date: '2026-01-15'  # Datum ueberschreiben
        #   output: 'RELEASE_NOTES.md'  # Default

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.markdown }}
          tag_name: ${{ github.ref_name }}
