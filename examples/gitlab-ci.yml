# =============================================================================
# GitLab CI – Automatische Release Notes bei Tag-Push
# =============================================================================
#
# 1. Kopiere diese Datei nach .gitlab-ci.yml (oder inkludiere sie)
# 2. Erstelle ein Project Access Token mit api-Scope
# 3. Speichere es als CI/CD-Variable: GITLAB_TOKEN
# 4. Pushe einen Tag: git tag v1.2.0 && git push --tags
# =============================================================================

release-notes:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script:
    - apk add --no-cache curl jq git
  script:
    # Commits sammeln
    - CURRENT_TAG="$CI_COMMIT_TAG"
    - PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)
    - VERSION="${CURRENT_TAG#v}"
    - |
      if [ -n "$PREVIOUS_TAG" ]; then
        COMMITS=$(git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --format=%B)
      else
        COMMITS=$(git log "${CURRENT_TAG}" --format=%B)
      fi

    # Release Notes generieren
    - |
      RESPONSE=$(curl -sf \
        -X POST \
        -H "Content-Type: application/json" \
        -d "$(jq -n --arg c "$COMMITS" --arg v "$VERSION" '{commits: $c, version: $v}')" \
        "https://rl-server.leon-achteresch.de/api/release-notes")
    - MARKDOWN=$(echo "$RESPONSE" | jq -r '.markdown')
    - echo "$MARKDOWN"

    # GitLab Release erstellen
    - |
      curl -sf \
        -X POST \
        -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "$(jq -n --arg tag "$CURRENT_TAG" --arg desc "$MARKDOWN" '{tag_name: $tag, description: $desc}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
